<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Экзамен — тренажёр</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;line-height:1.5}
.app{max-width:480px;margin:0 auto;padding:16px 16px 32px}
h1{font-size:1.35rem;text-align:center;margin-bottom:8px;color:#f8fafc}
.subtitle{text-align:center;color:#94a3b8;font-size:.9rem;margin-bottom:24px}
.screen{display:none}
.screen.active{display:block}
.ticket-grid{display:grid;gap:12px}
.ticket-btn{display:block;width:100%;padding:20px;border:none;border-radius:14px;background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;font-size:1.15rem;font-weight:600;-webkit-tap-highlight-color:transparent}
.ticket-btn:active{opacity:.85}
.progress-bar{height:6px;background:#1e293b;border-radius:3px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:#3b82f6;border-radius:3px;transition:width .3s}
.progress-text{font-size:.85rem;color:#94a3b8;margin-bottom:12px;display:flex;justify-content:space-between}
.score-live{color:#4ade80;font-weight:600}
.question-card{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:16px}
.question-text{font-size:1.05rem;color:#f1f5f9}
.options{display:flex;flex-direction:column;gap:10px}
.option-btn{display:block;width:100%;text-align:left;padding:14px 16px;border:2px solid #334155;border-radius:12px;background:#0f172a;color:#e2e8f0;font-size:.95rem;-webkit-tap-highlight-color:transparent}
.option-btn:disabled{opacity:1}
.option-btn .letter{font-weight:700;color:#60a5fa;margin-right:6px}
.option-btn.correct{border-color:#22c55e;background:#14532d;color:#bbf7d0}
.option-btn.wrong{border-color:#ef4444;background:#450a0a;color:#fecaca}
.option-btn.dim{opacity:.45}
.feedback{text-align:center;padding:14px;border-radius:12px;font-size:1.1rem;font-weight:700;margin-bottom:14px;display:none}
.feedback.show{display:block}
.feedback.ok{background:#14532d;color:#4ade80}
.feedback.bad{background:#450a0a;color:#f87171}
.next-btn,.back-btn,.restart-btn{display:block;width:100%;padding:16px;border:none;border-radius:12px;font-size:1rem;font-weight:600;-webkit-tap-highlight-color:transparent}
.next-btn{background:#3b82f6;color:#fff;display:none;margin-top:14px}
.next-btn.show{display:block}
.back-btn{background:transparent;color:#94a3b8;margin-top:12px;font-size:.9rem}
.result-card{background:#1e293b;border-radius:16px;padding:32px 20px;text-align:center;margin-bottom:20px}
.result-score{font-size:3rem;font-weight:800;color:#3b82f6;line-height:1;margin-bottom:8px}
.result-label{color:#94a3b8;margin-bottom:20px}
.result-detail{display:flex;justify-content:center;gap:24px;font-size:.95rem}
.result-detail .good{color:#4ade80}
.result-detail .bad{color:#f87171}
.restart-btn{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;margin-bottom:10px}
.hint{text-align:center;color:#64748b;font-size:.8rem;margin-top:20px;padding:0 10px}
</style>
</head>
<body>
<div class="app">

<div id="home" class="screen active">
  <h1>Тренажёр к экзамену</h1>
  <p class="subtitle">4 билета · 25 вопросов</p>
  <div class="ticket-grid">
    <button class="ticket-btn" onclick="startQuiz(0)">Билет 1</button>
    <button class="ticket-btn" onclick="startQuiz(1)">Билет 2</button>
    <button class="ticket-btn" onclick="startQuiz(2)">Билет 3</button>
    <button class="ticket-btn" onclick="startQuiz(3)">Билет 4</button>
  </div>
  <p class="hint">Если кнопки не работают — откройте файл в Safari (не в Telegram)</p>
</div>

<div id="quiz" class="screen">
  <div class="progress-text">
    <span id="progress-label">Вопрос 1 из 25</span>
    <span class="score-live" id="score-live">0 ✓</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="question-card"><p class="question-text" id="question-text"></p></div>
  <div class="feedback" id="feedback"></div>
  <div class="options" id="options"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Далее →</button>
  <button class="back-btn" onclick="goHome()">← К билетам</button>
</div>

<div id="result" class="screen">
  <h1>Результат</h1>
  <p class="subtitle" id="result-ticket"></p>
  <div class="result-card">
    <div class="result-score" id="result-score"></div>
    <div class="result-label">правильных из 25</div>
    <div class="result-detail">
      <span class="good" id="result-good"></span>
      <span class="bad" id="result-bad"></span>
    </div>
  </div>
  <button class="restart-btn" onclick="restartQuiz()">Пройти ещё раз</button>
  <button class="back-btn" onclick="goHome()">← К билетам</button>
</div>

</div>

": "Датчик температуры", "correct": false}, {"letter": "В", "text": "Электродвигатель", "correct": true}, {"letter": "Г", "text": "Осциллограф", "correct": false}, {"letter": "Д", "text": "Переключатель", "correct": false}]}, {"text": "Почему при проектировании мехатронных систем важно правильно согласовывать параметры регулятора и объекта управления, а не выбирать их независимо друг от друга?", "options": [{"letter": "А", "text": "потому что это влияет на устойчивость, точность и качество переходного процесса", "correct": true}, {"letter": "Б", "text": "потому что это изменяет материал корпуса", "correct": false}, {"letter": "В", "text": "потому что это не связано с работой системы", "correct": false}, {"letter": "Г", "text": "потому что это влияет только на внешний вид панели", "correct": false}, {"letter": "Д", "text": "потому что это необходимо только для документации", "correct": false}]}]}]}</script>
<script>
var EXAM_DATA = JSON.parse(document.getElementById("exam-data").textContent);
var currentTicket = null;
var currentIndex = 0;
var score = 0;
var answered = false;

function el(id) { return document.getElementById(id); }

function showScreen(id) {
  var screens = document.querySelectorAll(".screen");
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove("active");
  el(id).classList.add("active");
}

function goHome() { showScreen("home"); }

function startQuiz(index) {
  currentTicket = EXAM_DATA.tickets[index];
  currentIndex = 0;
  score = 0;
  showScreen("quiz");
  renderQuestion();
}

function restartQuiz() { startQuiz(currentTicket.id - 1); }

function renderQuestion() {
  answered = false;
  var q = currentTicket.questions[currentIndex];
  var total = currentTicket.questions.length;
  var num = currentIndex + 1;

  el("progress-label").textContent = "Вопрос " + num + " из " + total;
  el("score-live").textContent = score + " ✓";
  el("progress-fill").style.width = ((num - 1) / total * 100) + "%";
  el("question-text").textContent = q.text;

  var fb = el("feedback");
  fb.className = "feedback";
  fb.textContent = "";

  var nextBtn = el("next-btn");
  nextBtn.classList.remove("show");
  nextBtn.textContent = currentIndex < total - 1 ? "Далее →" : "Результат";

  var container = el("options");
  container.innerHTML = "";
  for (var i = 0; i < q.options.length; i++) {
  (function(opt) {
    var btn = document.createElement("button");
    btn.className = "option-btn";
    btn.setAttribute("data-letter", opt.letter);
    btn.innerHTML = '<span class="letter">' + opt.letter + ')</span>' + opt.text;
    btn.onclick = function() { selectAnswer(btn, opt); };
    container.appendChild(btn);
  })(q.options[i]);
  }
}

function selectAnswer(btn, opt) {
  if (answered) return;
  answered = true;
  if (opt.correct) score++;

  var fb = el("feedback");
  fb.classList.add("show");
  if (opt.correct) {
    fb.classList.add("ok");
    fb.textContent = "✓ Верно!";
    btn.classList.add("correct");
  } else {
    fb.classList.add("bad");
    fb.textContent = "✗ Неверно";
    btn.classList.add("wrong");
  }

  var buttons = document.querySelectorAll(".option-btn");
  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    b.disabled = true;
    var letter = b.getAttribute("data-letter");
    var opts = currentTicket.questions[currentIndex].options;
    var optData = null;
    for (var j = 0; j < opts.length; j++) {
      if (opts[j].letter === letter) { optData = opts[j]; break; }
    }
    if (optData && optData.correct) b.classList.add("correct");
    else if (b !== btn) b.classList.add("dim");
  }

  el("score-live").textContent = score + " ✓";
  el("next-btn").classList.add("show");
}

function nextQuestion() {
  if (currentIndex < currentTicket.questions.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  var total = currentTicket.questions.length;
  var wrong = total - score;
  el("result-ticket").textContent = currentTicket.title;
  el("result-score").textContent = score + "/" + total;
  el("result-good").textContent = "✓ " + score + " верно";
  el("result-bad").textContent = "✗ " + wrong + " ошибок";
  showScreen("result");
}
</script>
